<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow">
      <div class="card-header bg-primary text-white text-center">
        <h5 class="mb-0">🔑 Sign In to EMS</h5>
        <small class="opacity-75">upGrad Virtual Event Management System</small>
      </div>
      <div class="card-body">
        <div *ngIf="errorMsg" class="alert alert-danger py-2">
          {{ errorMsg }}
        </div>
        <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
            <input type="email" class="form-control" formControlName="emailId"
                   placeholder="your&#64;email.com"
                   [class.is-invalid]="f('emailId')?.invalid && f('emailId')?.touched">
            <div class="invalid-feedback">Enter a valid email.</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
            <input type="password" class="form-control" formControlName="password"
                   placeholder="Your password"
                   [class.is-invalid]="f('password')?.invalid && f('password')?.touched">
            <div class="invalid-feedback">Password is required (min 6 chars).</div>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
            Sign In
          </button>
        </form>
        <p class="mt-3 text-center text-muted small">
          Don't have an account? <a routerLink="/register">Create one here</a>
        </p>
      </div>
    </div>
  </div>
</div>
