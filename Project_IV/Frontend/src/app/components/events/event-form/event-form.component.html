<div class="row justify-content-center">
  <div class="col-lg-7 form-card">

    <div class="page-header mb-4">
      <h3 class="fw-bold mb-0">
        <i class="bi bi-calendar-plus me-2"></i>
        {{ isEditMode ? 'Edit Event' : 'Add New Event' }}
      </h3>
    </div>

    <div *ngIf="loading" class="spinner-container">
      <div class="spinner-border text-primary"></div>
    </div>

    <div class="card shadow-sm" *ngIf="!loading">
      <div class="card-body p-4">

        <div *ngIf="errorMsg" class="alert alert-danger">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMsg }}
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

          <!-- Event Name -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Event Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" formControlName="eventName"
                   placeholder="e.g. Angular Summit 2026"
                   [class.is-invalid]="f('eventName')?.invalid && f('eventName')?.touched">
            <div class="invalid-feedback">Event name is required (max 50 chars).</div>
          </div>

          <!-- Category -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
            <select class="form-select" formControlName="categoryId"
                    [class.is-invalid]="f('categoryId')?.invalid && f('categoryId')?.touched">
              <option value="">-- Select Category --</option>
              <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.categoryName }}</option>
            </select>
            <div class="invalid-feedback">Please select a category.</div>
          </div>

          <!-- Date + Status row -->
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Event Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" formControlName="eventDate"
                     [min]="today"
                     [class.is-invalid]="f('eventDate')?.invalid && f('eventDate')?.touched">
              <div class="invalid-feedback">A future date is required.</div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Status</label>
              <select class="form-select" formControlName="status">
                <option value="Active">Active</option>
                <option value="In-Active">In-Active</option>
              </select>
            </div>
          </div>

          <!-- Description -->
          <div class="mb-4">
            <label class="form-label fw-semibold">Description</label>
            <textarea class="form-control" formControlName="description"
                      rows="3" placeholder="Brief event description (optional)"
                      [class.is-invalid]="f('description')?.invalid && f('description')?.touched"></textarea>
            <div class="invalid-feedback">Max 500 characters.</div>
          </div>

          <!-- Actions -->
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" [disabled]="submitting">
              <span *ngIf="submitting" class="spinner-border spinner-border-sm me-1"></span>
              <i *ngIf="!submitting" class="bi bi-check-lg me-1"></i>
              {{ submitting ? 'Saving...' : (isEditMode ? 'Update Event' : 'Create Event') }}
            </button>
            <a routerLink="/events" class="btn btn-secondary">
              <i class="bi bi-x-lg me-1"></i>Cancel
            </a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
