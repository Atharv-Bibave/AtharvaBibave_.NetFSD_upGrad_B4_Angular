<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upgrad Events</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="index.html">Upgrad Events</a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="login.html">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="events.html">Events</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact Us</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container text-center mt-5">
      <h2>Welcome to Upgrad Virtual Event Management</h2>
      <p class="text-muted mt-3">
        Upgrad hosts virtual events in categories like Tech & Innovations and
        Industrial Events. Join us to explore knowledge, connect with experts,
        and enhance your professional skills.
      </p>
    </div>

    <div class="container mt-5">
      <h4 class="text-center mb-4">Upcoming Events</h4>
      <div class="row justify-content-center" id="homeEvents"></div>
    </div>

    <script src="js/register.js"></script>
    <script src="js/db.js"></script>

    <script>
      function loadHomeEvents() {
        getAllEvents(function (eventList) {
          var container = document.getElementById("homeEvents");
          container.innerHTML = "";

          for (var i = 0; i < eventList.length; i++) {
            var ev = eventList[i];
            container.innerHTML +=
              '<div class="col-md-4">' +
              '<div class="card p-3 mb-3">' +
              "<h5>" +
              ev.name +
              "</h5>" +
              "<p><b>Category:</b> " +
              ev.category +
              "</p>" +
              "<p><b>Date:</b> " +
              ev.date +
              "</p>" +
              "<p><b>Time:</b> " +
              ev.time +
              "</p>" +
              '<button class="btn btn-primary w-100" onclick="goToRegister(\'' +
              ev.id +
              "', '" +
              ev.name +
              "', '" +
              ev.category +
              "', '" +
              ev.date +
              "', '" +
              ev.time +
              "')\">Register</button>" +
              "</div>" +
              "</div>";
          }
        });
      }
      loadHomeEvents();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
