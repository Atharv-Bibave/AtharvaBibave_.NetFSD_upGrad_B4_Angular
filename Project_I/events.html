<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Events</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body onload="checkAuth()" style="visibility: hidden">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="index.html">Upgrad Events</a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="login.html">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="events.html">Events</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact Us</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row mb-3">
        <div class="col-md-6">
          <h3>Manage Events</h3>
        </div>
        <div class="col-md-6 text-end">
          <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="card p-3 mb-4">
        <h5>Add Event</h5>
        <form id="eventForm">
          <div class="mb-2">
            <label for="eventId" class="form-label">Event ID</label>
            <input
              type="text"
              id="eventId"
              class="form-control"
              placeholder="Event ID"
              required
            />
          </div>
          <div class="mb-2">
            <label for="eventName" class="form-label">Event Name</label>
            <input
              type="text"
              id="eventName"
              class="form-control"
              placeholder="Event Name"
              required
            />
          </div>
          <div class="mb-2">
            <label for="eventCategory" class="form-label">Category</label>
            <select id="eventCategory" class="form-control" required>
              <option value="">Select Category</option>
              <option>Tech & Innovations</option>
              <option>Industrial Event</option>
            </select>
          </div>
          <div class="mb-2">
            <label for="eventDate" class="form-label">Event Date</label>
            <input type="date" id="eventDate" class="form-control" required />
          </div>
          <div class="mb-2">
            <label for="eventTime" class="form-label">Event Time</label>
            <input type="time" id="eventTime" class="form-control" required />
          </div>
          <div class="mb-2">
            <label for="eventURL" class="form-label">Event URL</label>
            <input
              type="url"
              id="eventURL"
              class="form-control"
              placeholder="Event URL"
              required
            />
          </div>
          <button type="button" onclick="addEvent()" class="btn btn-success">
            Add Event
          </button>
        </form>
      </div>

      <div class="card p-3 mb-4">
        <h5>Search Event</h5>
        <div class="row">
          <div class="col-md-3">
            <select id="searchType" class="form-control">
              <option value="id">ID</option>
              <option value="name">Name</option>
              <option value="category">Category</option>
            </select>
          </div>
          <div class="col-md-5">
            <input
              type="text"
              id="searchValue"
              class="form-control"
              placeholder="Enter search value"
            />
          </div>
          <div class="col-md-2">
            <button class="btn btn-primary w-100" onclick="searchEvents()">
              Search
            </button>
          </div>
          <div class="col-md-2">
            <button class="btn btn-secondary w-100" onclick="resetSearch()">
              Reset
            </button>
          </div>
        </div>
      </div>

      <div class="row justify-content-center" id="eventContainer"></div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/db.js"></script>
    <script src="js/events.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
